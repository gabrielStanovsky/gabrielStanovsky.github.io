<link id="slab-favicon" rel="icon" type="image/png" href="/logos/home-logo/1.png">
<script>
  (function () {
    var themes = ["monochrome", "blackwhite", "dark"];
    var theme = "monochrome";
    var savedTheme = null;
    try {
      savedTheme = window.localStorage.getItem("slabColorTheme");
    } catch (error) {}
    if (themes.indexOf(savedTheme) !== -1) {
      theme = savedTheme;
      document.documentElement.setAttribute("data-slab-theme-source", "saved");
    } else {
      theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "monochrome";
      document.documentElement.setAttribute("data-slab-theme-source", "system");
    }
    document.documentElement.setAttribute("data-slab-theme", theme);
  }());
</script>
<script>
  (function () {
    var homeIcons = [
      {% assign home_icon_files = site.static_files | sort: "path" %}
      {% for file in home_icon_files %}
      {% if file.path contains "/logos/home-logo/" and file.extname == ".png" %}
      "{{ file.path }}"{% unless forloop.last %},{% endunless %}
      {% endif %}
      {% endfor %}
    ].filter(Boolean);
    if (!homeIcons.length) return;
    var chosen = homeIcons[Math.floor(Math.random() * homeIcons.length)];

    var faviconHref = chosen + "?session=" + encodeURIComponent(chosen.split("/").pop().replace(".png", ""));
    document.querySelectorAll("link[rel~='icon'], link[rel='shortcut icon'], #slab-favicon").forEach(function (icon) {
      icon.setAttribute("href", faviconHref);
      icon.setAttribute("type", "image/png");
    });

    window.slabHomeIcon = chosen;
  }());
</script>
