# Logo controls.
# scale is in percent: 100 means natural size, 90 is smaller, 115 is larger.
# y_offset is in pixels: positive moves the logo down, negative moves it up.
#
# Fixed top-bar/sidebar logos:
nav:
  group:
    scale: 145
    y_offset: 4
  publications:
    scale: 110
    y_offset: 2
  teaching:
    scale: 110
    y_offset: 2
  talks:
    scale: 88
    y_offset: 0
  schedule:
    scale: 130
    y_offset: 2
  contact:
    scale: 140
    y_offset: 0
  cv:
    scale: 120
    y_offset: 1

